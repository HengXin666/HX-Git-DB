name: 📦 发布到 PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: 🔨 构建
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 安装 uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: 📦 构建 sdist + wheel
        run: uv build

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: 🚀 发布到 PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: pypi
      url: https://pypi.org/p/hx-git-db

    permissions:
      id-token: write

    steps:
      - name: 📥 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🚀 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-test:
    name: 🧪 发布到 TestPyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch'

    environment:
      name: testpypi
      url: https://test.pypi.org/p/hx-git-db

    permissions:
      id-token: write

    steps:
      - name: 📥 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🧪 发布到 TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
