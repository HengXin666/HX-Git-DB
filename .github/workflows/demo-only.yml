name: Demo Only Mode

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install HX-Git-DB
        run: pip install .

      - name: Write data (only mode)
        run: |
          python -c "
          import datetime

          from hx_git_db import make_database

          now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8)))
          ts = now.strftime('%Y-%m-%d %H:%M:%S')
          msg = 'only mode sync'

          with make_database(
              'https://github.com/${{ github.repository }}.git',
              'example-only',
              only=True,
          ) as db:
              with db.open('log.txt') as f:
                  f.write(f'[{ts}] {msg}\n')
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
